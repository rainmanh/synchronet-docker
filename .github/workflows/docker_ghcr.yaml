name: Docker Image Synchronet BBS

on:
  push:
    branches:
    - main
  schedule:
    - cron: '0 0 1,16 * *'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Find Latest Version
        id: sbbs_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          synchronet_tags=$(curl -s https://raw.githubusercontent.com/SynchronetBBS/sbbs/master/install/install.iss | grep "#define MyAppVersion "|awk '{print $3}'|tr -d \")
          latest_container_tag=$(gh api \
          /users/${{ github.actor }}/packages/container/synchronet-bbs/versions \
          --jq '.[].metadata.container.tags[]' \
          | grep -E '^[0-9]' \
          | sort -V \
          | tail -n1)
          if [ "$synchronet_tags" != "$latest_container_tag" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          fi
          echo "latest_container_tag=$latest_container_tag" >> $GITHUB_OUTPUT
          echo "synchronet_tags=$synchronet_tags" >> $GITHUB_OUTPUT
        shell: bash

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Synchronet-BBS
        uses: docker/build-push-action@v5
        if: ${{ steps.sbbs_version.outputs.build == 'true' }}
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/synchronet-bbs:latest
            ghcr.io/${{ github.actor }}/synchronet-bbs:${{ steps.sbbs_version.outputs.synchronet_tags }}

      - name: Publish version summary
        run: |
          {
            echo "## Synchronet Version Check"
            echo ""
            echo "| Source | Version |"
            echo "|------|------|"
            echo "| Upstream | ${{ steps.sbbs_version.outputs.synchronet_tags }} |"
            echo "| Container | ${{ steps.sbbs_version.outputs.latest_container_tag }} |"
          } >> $GITHUB_STEP_SUMMARY
